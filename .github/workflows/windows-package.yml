name: Windows package

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Restore
        shell: pwsh
        run: dotnet restore .\AgentGuard.Windows.sln

      - name: Build
        shell: pwsh
        run: dotnet build .\AgentGuard.Windows.sln -c Release --no-restore

      - name: Smoke test
        shell: pwsh
        run: dotnet run --project .\tools\AgentGuard.SmokeTest\AgentGuard.SmokeTest.csproj -c Release

      - name: Publish app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts\publish\AgentGuard | Out-Null
          dotnet publish .\src\AgentGuard.App\AgentGuard.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:PublishReadyToRun=false -o artifacts\publish\AgentGuard
          @("WindowsBase.dll", "PresentationCore.dll", "PresentationFramework.dll") | ForEach-Object {
            $path = Join-Path "artifacts\publish\AgentGuard" $_
            if (-not (Test-Path $path)) {
              throw "WPF runtime dependency missing from publish output: $_"
            }
          }

      - name: Publish bridge
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts\publish\HookBridge | Out-Null
          dotnet publish .\src\AgentGuard.HookBridge\AgentGuard.HookBridge.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:PublishReadyToRun=false -o artifacts\publish\HookBridge
          Copy-Item artifacts\publish\HookBridge\* artifacts\publish\AgentGuard -Recurse -Force
          @("WindowsBase.dll", "PresentationCore.dll", "PresentationFramework.dll") | ForEach-Object {
            $path = Join-Path "artifacts\publish\AgentGuard" $_
            if (-not (Test-Path $path)) {
              throw "WPF runtime dependency missing after bridge merge: $_"
            }
          }

      - name: Launch packaged app
        shell: pwsh
        run: |
          $log = Join-Path $env:APPDATA "AgentGuard\logs\app.log"
          Remove-Item $log -Force -ErrorAction SilentlyContinue
          $process = Start-Process -FilePath artifacts\publish\AgentGuard\AgentGuard.exe -PassThru
          Start-Sleep -Seconds 8
          if ($process.HasExited) {
            if (Test-Path $log) {
              Get-Content $log
            }
            Get-WinEvent -FilterHashtable @{LogName="Application"; StartTime=(Get-Date).AddMinutes(-2)} -ErrorAction SilentlyContinue |
              Where-Object { $_.ProviderName -in @(".NET Runtime", "Application Error") } |
              Select-Object -First 10 |
              Format-List TimeCreated, ProviderName, Id, LevelDisplayName, Message
            throw "Published AgentGuard.exe exited during launch verification with code $($process.ExitCode)."
          }
          $process.Refresh()
          if ($process.MainWindowHandle -eq 0) {
            if (Test-Path $log) {
              Get-Content $log
            }
            Stop-Process -Id $process.Id -Force
            throw "Published AgentGuard.exe did not create a main window."
          }
          Stop-Process -Id $process.Id -Force

      - name: Create portable zip
        shell: pwsh
        run: Compress-Archive -Path artifacts\publish\AgentGuard\* -DestinationPath artifacts\AgentGuard-Windows-Release-win-x64.zip -Force

      - name: Build installer
        shell: pwsh
        run: |
          $env:AGENTGUARD_INSTALLER_SOURCE = (Resolve-Path artifacts\publish\AgentGuard).Path
          $env:AGENTGUARD_INSTALLER_OUTPUT = (Resolve-Path artifacts).Path
          $env:AGENTGUARD_INSTALLER_VERSION = "0.1.0"
          $env:AGENTGUARD_INSTALLER_ICON = (Resolve-Path src\AgentGuard.App\Assets\AppIcon.ico).Path
          iscc.exe .\scripts\installer.iss

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: AgentGuard-Windows-Release-win-x64
          path: |
            artifacts\AgentGuard-Windows-Release-win-x64.zip
            artifacts\AgentGuardSetup.exe

      - name: Publish latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "latest"
          $zipPackage = "artifacts\AgentGuard-Windows-Release-win-x64.zip"
          $installer = "artifacts\AgentGuardSetup.exe"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $tag $env:GITHUB_SHA
          git push origin "refs/tags/$tag" --force

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $installer $zipPackage --repo $env:GITHUB_REPOSITORY --clobber
            gh release edit $tag --repo $env:GITHUB_REPOSITORY --title "Latest Windows Build" --notes "Download AgentGuardSetup.exe for the direct Windows installer. The zip package is also attached for portable inspection."
          }
          else {
            gh release create $tag $installer $zipPackage --repo $env:GITHUB_REPOSITORY --title "Latest Windows Build" --notes "Download AgentGuardSetup.exe for the direct Windows installer. The zip package is also attached for portable inspection."
          }
