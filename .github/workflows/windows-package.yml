name: Windows package

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build and package
        shell: pwsh
        run: .\scripts\package.ps1 -Configuration Release -Runtime win-x64

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: AgentGuard-Windows-Release-win-x64
          path: artifacts\AgentGuard-Windows-Release-win-x64.zip
